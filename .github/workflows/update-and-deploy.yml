name: Update CB data and deploy

on:
  schedule:
    - cron: "10 9 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch CB redemption alerts
        run: python scripts/fetch_cb_redemption_alerts.py --max-seconds 480

      - name: Update CB primary market data
        run: python scripts/update_cb_primary_market.py

      - name: Update CB data
        run: python scripts/update_cb_quotes.py

      - name: Fetch analyst target prices
        run: python scripts/fetch_analyst_targets_from_web.py --limit 50 || true

      - name: Build public site
        run: python scripts/build_public_site.py

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
