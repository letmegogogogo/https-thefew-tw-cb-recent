name: Update CB data and deploy

on:
  push:
    branches:
      - main
  schedule:
    # Post-close refresh: Taiwan time 15:10, Monday-Friday.
    - cron: "10 7 * * 1-5"
    # Backup daily refresh: Taiwan time 17:10, Monday-Friday.
    - cron: "10 9 * * 1-5"
    # Revenue announcement season: Taiwan time 18:10, 21:10 on the 1st-10th of every month.
    - cron: "10 10 1-10 * *"
    - cron: "10 13 1-10 * *"
    # Full enrichment refresh: Taiwan time 21:40, Monday-Friday.
    - cron: "40 13 * * 1-5"
    # Dedicated redemption scan: Taiwan time 20:30, every day.
    - cron: "30 12 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Update mode: fast for daily deploy, full for enrichment"
        required: false
        default: fast
        type: choice
        options:
          - fast
          - full
          - deploy

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore monthly revenue history cache
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.mode == 'deploy') }}
        uses: actions/cache@v4
        with:
          path: .cache/revenue-history-records.json
          key: revenue-history-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            revenue-history-${{ runner.os }}-

      - name: Fast fetch CB redemption alerts
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.mode == 'deploy') && !((github.event_name == 'workflow_dispatch' && inputs.mode == 'full') || (github.event_name == 'schedule' && (github.event.schedule == '40 13 * * 1-5' || github.event.schedule == '30 12 * * *'))) }}
        run: python scripts/fetch_cb_redemption_alerts.py --max-seconds 120 --timeout 8 --max-candidates 1

      - name: Full fetch CB redemption alerts
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.mode == 'full') || (github.event_name == 'schedule' && (github.event.schedule == '40 13 * * 1-5' || github.event.schedule == '30 12 * * *')) }}
        run: python scripts/fetch_cb_redemption_alerts.py --scan-all --max-seconds 480

      - name: Persist CB redemption alerts
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.mode == 'deploy') }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/cb-redemption-alerts.json outputs/cb-redemption-alerts-log.csv
          if ! git diff --cached --quiet; then
            git commit -m "Update CB redemption alerts [skip ci]"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - name: Update CB primary market data
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.mode == 'deploy') && !(github.event_name == 'schedule' && github.event.schedule == '30 12 * * *') }}
        run: python scripts/update_cb_primary_market.py --queries-per-source 1 --search-limit 3 --follow-link-limit 8 --timeout 8

      - name: Update USD/TWD exchange-rate history
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.mode == 'deploy') && !(github.event_name == 'schedule' && github.event.schedule == '30 12 * * *') }}
        run: python scripts/update_exchange_rates.py

      - name: Update CB data
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.mode == 'deploy') }}
        run: python scripts/update_cb_quotes.py

      - name: Enrich new CB company tags
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.mode == 'deploy') && !(github.event_name == 'schedule' && github.event.schedule == '30 12 * * *') }}
        run: python scripts/enrich_new_cb_company_tags.py --limit 20

      - name: Fast enrich new CB issuance purposes
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.mode == 'deploy') && !(github.event_name == 'schedule' && github.event.schedule == '30 12 * * *') && !((github.event_name == 'workflow_dispatch' && inputs.mode == 'full') || (github.event_name == 'schedule' && github.event.schedule == '40 13 * * 1-5')) }}
        run: python scripts/enrich_new_cb_issuance_purposes.py --limit 3 --max-candidates 2 --timeout 6

      - name: Full enrich new CB issuance purposes
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.mode == 'full') || (github.event_name == 'schedule' && github.event.schedule == '40 13 * * 1-5') }}
        run: python scripts/enrich_new_cb_issuance_purposes.py --limit 20 --max-candidates 3 --timeout 10

      - name: Refresh CB data with enriched tags and purposes
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.mode == 'deploy') && !(github.event_name == 'schedule' && github.event.schedule == '30 12 * * *') }}
        run: python scripts/update_cb_quotes.py

      - name: Build public site
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.mode == 'deploy') }}
        run: python scripts/build_public_site.py

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
