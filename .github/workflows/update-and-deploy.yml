name: Update CB data and deploy

on:
  schedule:
    - cron: "10 9 * * 1-5"
  workflow_dispatch:
    inputs:
      mode:
        description: "Update mode: fast for daily deploy, full for enrichment"
        required: false
        default: fast
        type: choice
        options:
          - fast
          - full

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fast fetch CB redemption alerts
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.mode != 'full' }}
        run: python scripts/fetch_cb_redemption_alerts.py --max-seconds 480 --timeout 8 --max-candidates 1

      - name: Full fetch CB redemption alerts
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'full' }}
        run: python scripts/fetch_cb_redemption_alerts.py --scan-all --max-seconds 480

      - name: Update CB primary market data
        run: python scripts/update_cb_primary_market.py --queries-per-source 1 --search-limit 3 --follow-link-limit 8 --timeout 8

      - name: Update CB data
        run: python scripts/update_cb_quotes.py

      - name: Enrich new CB company tags
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'full' }}
        run: python scripts/enrich_new_cb_company_tags.py --limit 20

      - name: Enrich new CB issuance purposes
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'full' }}
        run: python scripts/enrich_new_cb_issuance_purposes.py --limit 5 --max-candidates 2 --timeout 8

      - name: Refresh CB data with enriched tags and purposes
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'full' }}
        run: python scripts/update_cb_quotes.py

      - name: Build public site
        run: python scripts/build_public_site.py

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
